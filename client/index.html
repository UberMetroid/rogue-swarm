<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue Swarm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a12; overflow: hidden; }
        canvas { display: block; }
        #ui {
            position: fixed; top: 20px; left: 20px;
            color: #00ffaa; font-family: monospace;
            font-size: 18px; text-shadow: 0 0 10px #00ffaa;
        }
        #status {
            position: fixed; bottom: 20px; left: 20px;
            color: #666; font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="wave">Wave: 1</div>
        <div id="score">Score: 0</div>
    </div>
    <div id="status">Connecting...</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        import init from './pkg/client.js';
        init().then(() => {
            document.getElementById('status').textContent = 'Game loaded - WASM running';
        });
    </script>
</body>
</html>
