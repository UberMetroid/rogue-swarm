name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Server & Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl, wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build server
        run: cargo build --release -p server --target x86_64-unknown-linux-musl

      - name: Build client
        run: wasm-pack build --target web -d ../pkg client

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: rogue-swarm-server
          path: target/x86_64-unknown-linux-musl/release/server

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-wasm
          path: pkg/

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: rogue-swarm-server
          path: docker-context/

      - name: Download client WASM
        uses: actions/download-artifact@v4
        with:
          name: client-wasm
          path: docker-context/client/pkg/

      - name: Copy client HTML into context
        run: cp client/index.html docker-context/client/

      - name: Copy Dockerfile into context
        run: cp Dockerfile docker-context/

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./docker-context
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/ubermetroid/rogue-swarm:latest
            ghcr.io/ubermetroid/rogue-swarm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
